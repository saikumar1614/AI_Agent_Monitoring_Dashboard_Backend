version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_monitoring_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_monitoring_network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_monitoring_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_monitoring
      DEBUG: 'False'
      HOST: 0.0.0.0
      PORT: 8000
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ai_monitoring_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: {}

networks:
  ai_monitoring_network:
    driver: bridge
